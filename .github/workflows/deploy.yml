name: CI/CD → Build, Push, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]    # CI only on PRs — no deploy

# Least-privilege: only the token permissions we actually need
permissions:
  contents: read
  packages: write       # push to ghcr.io

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/google-hub

jobs:
  # ── Job 1: Lint & type-check ─────────────────────────────────────────────
  ci:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vite build (smoke test)
        working-directory: frontend
        env:
          VITE_API_BASE: ""
        run: npm run build

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Backend syntax check
        run: |
          python -m py_compile backend/db.py
          python -m py_compile backend/auth.py
          python -m py_compile backend/logger.py
          python -m py_compile backend/gcp_setup.py
          python -m py_compile backend/main.py
          python -m py_compile backend/routers/drive.py
          python -m py_compile backend/routers/gmail.py
          python -m py_compile backend/routers/calendar.py
          python -m py_compile backend/routers/sheets.py
          python -m py_compile backend/routers/docs.py
          python -m py_compile backend/routers/youtube.py
          python -m py_compile backend/routers/preflight.py
          python -m py_compile backend/routers/setup.py

  # ── Job 2: Build & Push Docker image ─────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: ci                       # only runs if CI passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub Actions cache for faster rebuilds
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Job 3: Deploy to Render ───────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Trigger deploy via Render API
        run: |
          echo "Triggering Render deployment for service ${{ secrets.RENDER_SERVICE_ID }}..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP status: $STATUS"
          echo "Response: $BODY"
          if [ "$STATUS" != "201" ]; then
            echo "❌ Deploy trigger failed with HTTP $STATUS"
            exit 1
          fi
          DEPLOY_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null || echo "")
          echo "Deploy ID: $DEPLOY_ID"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Wait for deploy to complete
        run: |
          echo "Polling deploy status..."
          for i in $(seq 1 30); do
            sleep 15
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys/${{ env.DEPLOY_ID }}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
            echo "Attempt $i/30 — deploy status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "✅ Deploy is live!"
              exit 0
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Deploy $STATUS"
              exit 1
            fi
          done
          echo "⚠️ Timed out waiting — check Render dashboard"

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_APP_URL }}/health" || echo "000")
          echo "Health: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ App is healthy" || echo "⚠️ Got $STATUS — may still be starting"
