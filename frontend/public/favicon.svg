<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g2" x1="64" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4f8ef7"/>
    </linearGradient>
  </defs>
  <!-- Outer rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#g1)"/>
  <!-- Center hub circle -->
  <circle cx="32" cy="32" r="7" fill="white" opacity="0.95"/>
  <!-- 6 spokes radiating out -->
  <line x1="32" y1="32" x2="32" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="32" y1="32" x2="32" y2="52" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="32" y1="32" x2="15" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="32" y1="32" x2="49" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="32" y1="32" x2="15" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="32" y1="32" x2="49" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- 6 outer node dots -->
  <circle cx="32" cy="12" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="32" cy="52" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="15" cy="22" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="49" cy="42" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="15" cy="42" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="49" cy="22" r="3.5" fill="white" opacity="0.9"/>
</svg>
