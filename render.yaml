services:
  - type: web
    name: google-hub
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    autoDeploy: false   # CI/CD pipeline controls deploys

    envVars:
      - key: PORT
        value: "8001"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      # Injected automatically by Render from the linked database below
      - key: DATABASE_URL
        fromDatabase:
          name: google-hub-db
          property: connectionString
      # Set after first deploy — use the service's own URL
      - key: CORS_ORIGIN
        sync: false

# Free Postgres instance — 1 GB storage, 97 MB RAM
databases:
  - name: google-hub-db
    plan: free
    region: oregon
